<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Log Server</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-8 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [url, setUrl] = useState('http://localhost:3000');
            const [method, setMethod] = useState('GET');
            const [logData, setLogData] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [autoRefresh, setAutoRefresh] = useState(false);

            const fetchLog = async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': '*/*, text/plain, application/json'
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.indexOf("application/json") !== -1) {
                        const jsonData = await response.json();
                        setLogData(JSON.stringify(jsonData, null, 2));
                    } else {
                        const textData = await response.text();
                        setLogData(textData);
                    }
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                let interval;
                if (autoRefresh) {
                    fetchLog();
                    interval = setInterval(() => {
                        fetchLog();
                    }, 3000); 
                }
                return () => clearInterval(interval);
            }, [autoRefresh, url, method]);

            return (
                <div className="max-w-5xl mx-auto bg-white p-6 rounded-xl shadow-lg border border-slate-200">
                    <div className="flex justify-between items-center mb-6 border-b pb-4">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-900">HTTP Server Tester </h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <input 
                                type="checkbox" 
                                id="autoRefresh" 
                                checked={autoRefresh}
                                onChange={(e) => setAutoRefresh(e.target.checked)}
                                className="w-4 h-4 text-blue-600 rounded"
                            />
                            <label htmlFor="autoRefresh" className="text-sm font-medium">Auto-refresh (3s)</label>
                        </div>
                    </div>

                    <div className="flex gap-4 mb-4">
                        <select 
                            value={method} 
                            onChange={(e) => setMethod(e.target.value)}
                            className="p-2.5 border border-slate-300 rounded-lg bg-slate-50 font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500"
                        >
                            <option>GET</option>
                            <option>POST</option>
                            <option>PUT</option>
                            <option>DELETE</option>
                        </select>
                        
                        <input 
                            type="text" 
                            value={url}
                            onChange={(e) => setUrl(e.target.value)}
                            className="flex-1 p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                            placeholder="http://localhost:8000/logs"
                        />
                        
                        <button 
                            onClick={fetchLog}
                            className={`px-6 py-2.5 rounded-lg font-medium transition-colors ${loading ? 'bg-blue-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'} text-white shadow-sm`}
                            disabled={loading && !autoRefresh}
                        >
                            {loading ? 'Requesting...' : 'Send Request'}
                        </button>
                    </div>
                    
                    {error && (
                        <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 flex items-center gap-2">
                            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>
                            <span className="font-medium">Error:</span> {error} 
                            <span className="text-sm opacity-80">(Check CORS if connecting to a different port/domain)</span>
                        </div>
                    )}

                    <div className="bg-[#1e1e1e] text-emerald-400 p-5 rounded-lg overflow-auto h-[600px] font-mono text-[13px] leading-relaxed shadow-inner">
                        <pre className="whitespace-pre-wrap break-all">{logData || 'Waiting for request...\n\nHint: Open your browser devtools (F12) to inspect network requests if you encounter CORS issues.'}</pre>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
